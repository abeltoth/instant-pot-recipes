<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instant Pot Pro Crisp — Week 1 Meal Plan</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --orange: #e8772e;
  --orange-light: #f5a623;
  --warm-bg: #fdf6ee;
  --warm-white: #fffaf5;
  --card-bg: #ffffff;
  --text: #3a2e26;
  --text-light: #7a6b5d;
  --border: #ede3d6;
  --green: #4a9d5b;
  --blue: #4a8db7;
  --purple: #8b6aad;
  --red: #c0504d;
  --shadow: 0 2px 8px rgba(58,46,38,0.08);
  --shadow-lg: 0 4px 16px rgba(58,46,38,0.12);
  --radius: 12px;
  --header-bg: linear-gradient(135deg, var(--orange), var(--orange-light));
  --header-shadow: 0 2px 12px rgba(232,119,46,0.3);
  --badge-pressure-bg: #e8f4f8;
  --badge-air-bg: #fdf0e6;
  --badge-combo-bg: #f3edf8;
  --badge-saute-bg: #e8f5e8;
  --tip-bg: linear-gradient(135deg, #fff8f0, #fff3e6);
  --tip-border: #f5dcc0;
  --overlay-bg: rgba(0,0,0,0.6);
  --cook-bg: #fffaf5;
}

body.dark {
  --warm-bg: #1a1612;
  --warm-white: #22201c;
  --card-bg: #2a2420;
  --text: #e8ddd0;
  --text-light: #a89880;
  --border: #3d3530;
  --shadow: 0 2px 8px rgba(0,0,0,0.2);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.3);
  --badge-pressure-bg: #1a2c33;
  --badge-air-bg: #2e2218;
  --badge-combo-bg: #26203a;
  --badge-saute-bg: #1a2e1a;
  --tip-bg: linear-gradient(135deg, #2a2218, #261f15);
  --tip-border: #4a3828;
  --overlay-bg: rgba(0,0,0,0.8);
  --cook-bg: #1a1612;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--warm-bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* Header */
.header {
  background: var(--header-bg);
  color: white;
  padding: 1.25rem 1rem 0.85rem;
  text-align: center;
  position: relative;
  z-index: 100;
  box-shadow: var(--header-shadow);
}

.header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
.header-sub { font-size: 0.85rem; opacity: 0.9; margin-top: 0.2rem; }

.dairy-free-badge {
  display: inline-block;
  background: rgba(255,255,255,0.25);
  padding: 0.15rem 0.6rem;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 600;
  margin-top: 0.4rem;
  backdrop-filter: blur(4px);
}

.dark-toggle {
  position: absolute;
  top: 1rem;
  right: 1rem;
  background: rgba(255,255,255,0.2);
  border: none;
  border-radius: 50%;
  width: 36px;
  height: 36px;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.dark-toggle:hover { background: rgba(255,255,255,0.35); }

.lang-toggle {
  position: absolute;
  top: 1rem;
  left: 1rem;
  background: rgba(255,255,255,0.2);
  border: none;
  border-radius: 12px;
  padding: 0.25rem 0.6rem;
  font-size: 0.78rem;
  font-weight: 700;
  color: white;
  cursor: pointer;
  transition: background 0.2s;
  letter-spacing: 0.03em;
}
.lang-toggle:hover { background: rgba(255,255,255,0.35); }

/* Tabs */
.tabs {
  display: flex;
  background: var(--card-bg);
  border-bottom: 2px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 99;
  box-shadow: var(--shadow);
}

.tab {
  flex: 1;
  padding: 0.75rem 0.25rem;
  text-align: center;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text-light);
  cursor: pointer;
  border: none;
  background: none;
  transition: all 0.2s;
  border-bottom: 3px solid transparent;
  user-select: none;
  white-space: nowrap;
}

.tab.active { color: var(--orange); border-bottom-color: var(--orange); background: var(--warm-white); }
.tab:hover { color: var(--orange); }

/* Content */
.content { padding: 1rem; max-width: 700px; margin: 0 auto; }
.view { display: none; }
.view.active { display: block; }

/* Day Cards */
.day-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  margin-bottom: 0.75rem;
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.day-card.expanded { box-shadow: var(--shadow-lg); }

.day-header {
  padding: 1rem 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  user-select: none;
  transition: background 0.15s;
}
.day-header:hover { background: var(--warm-white); }
.day-emoji { font-size: 1.5rem; }
.day-info { flex: 1; }
.day-name { font-weight: 700; font-size: 1.05rem; }
.day-theme { font-size: 0.8rem; color: var(--text-light); margin-top: 0.1rem; }
.day-chevron { font-size: 1.1rem; color: var(--text-light); transition: transform 0.3s; }
.day-card.expanded .day-chevron { transform: rotate(180deg); }
.day-body { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
.day-card.expanded .day-body { max-height: 5000px; }
.day-content { padding: 0 1.1rem 1.1rem; }

/* Meal blocks */
.meal {
  margin-bottom: 0.85rem;
  padding: 0.85rem;
  background: var(--warm-white);
  border-radius: 8px;
  border-left: 4px solid var(--orange);
  position: relative;
}
.meal:last-child { margin-bottom: 0; }

.meal-header { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.35rem; flex-wrap: wrap; }
.meal-type { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-light); }
.meal-name { font-weight: 600; font-size: 0.95rem; flex: 1; }

/* Badges */
.badge {
  display: inline-block;
  padding: 0.12rem 0.45rem;
  border-radius: 20px;
  font-size: 0.62rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.badge-pressure { background: var(--badge-pressure-bg); color: var(--blue); }
.badge-air { background: var(--badge-air-bg); color: var(--orange); }
.badge-combo { background: var(--badge-combo-bg); color: var(--purple); }
.badge-saute { background: var(--badge-saute-bg); color: var(--green); }

.meal-steps { font-size: 0.85rem; color: var(--text); line-height: 1.7; }
.meal-steps .step { padding-left: 0.2rem; margin-bottom: 0.25rem; }

/* Action buttons (heart + cook) */
.meal-actions {
  display: flex;
  gap: 0.5rem;
  margin-top: 0.6rem;
}

.btn-heart, .btn-cook {
  border: none;
  border-radius: 6px;
  padding: 0.35rem 0.7rem;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.3rem;
  transition: all 0.15s;
}

.btn-heart {
  background: var(--card-bg);
  color: var(--text-light);
  border: 1.5px solid var(--border);
}
.btn-heart:hover, .btn-heart.active { color: var(--red); border-color: var(--red); }
.btn-heart.active { background: #fdf0ef; }
body.dark .btn-heart.active { background: #3a2020; }

.btn-cook {
  background: var(--orange);
  color: white;
  border: 1.5px solid transparent;
}
.btn-cook:hover { background: var(--orange-light); }

/* Servings stepper */
.servings-ctrl {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  margin-top: 0.5rem;
  font-size: 0.8rem;
  color: var(--text-light);
}
.servings-ctrl button {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--card-bg);
  color: var(--text);
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
}
.servings-ctrl button:hover { border-color: var(--orange); color: var(--orange); }
.servings-val { font-weight: 700; min-width: 20px; text-align: center; color: var(--text); }

/* Ingredients list */
.ingredients-list {
  margin-top: 0.4rem;
  margin-bottom: 0.5rem;
  padding: 0.5rem 0.6rem;
  background: var(--card-bg);
  border-radius: 6px;
  font-size: 0.82rem;
}
.ingredients-list .ing-item {
  padding: 0.15rem 0;
  display: flex;
  gap: 0.3rem;
}
.ing-amount { font-weight: 600; color: var(--orange); min-width: 50px; }

/* Filter pills */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-bottom: 1rem;
}
.filter-label {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--text-light);
  width: 100%;
  margin-bottom: 0.1rem;
  letter-spacing: 0.04em;
}
.filter-pill {
  padding: 0.3rem 0.7rem;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--card-bg);
  color: var(--text-light);
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-pill:hover { border-color: var(--orange); color: var(--orange); }
.filter-pill.active { background: var(--orange); color: white; border-color: var(--orange); }

/* Recipe cards (Recipes tab) */
.recipe-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  margin-bottom: 0.65rem;
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.recipe-card.expanded { box-shadow: var(--shadow-lg); }

.recipe-card-header {
  padding: 0.85rem 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.6rem;
  user-select: none;
}
.recipe-card-header:hover { background: var(--warm-white); }

.recipe-card-info { flex: 1; }
.recipe-card-name { font-weight: 700; font-size: 0.95rem; }
.recipe-card-meta { font-size: 0.75rem; color: var(--text-light); margin-top: 0.15rem; }
.recipe-card-badges { display: flex; gap: 0.3rem; margin-top: 0.3rem; flex-wrap: wrap; }
.recipe-card-heart {
  font-size: 1.2rem;
  cursor: pointer;
  padding: 0.3rem;
  transition: transform 0.15s;
}
.recipe-card-heart:hover { transform: scale(1.2); }
.recipe-card-chevron { font-size: 1rem; color: var(--text-light); transition: transform 0.3s; }
.recipe-card.expanded .recipe-card-chevron { transform: rotate(180deg); }

.recipe-card-body { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
.recipe-card.expanded .recipe-card-body { max-height: 2000px; }
.recipe-card-content { padding: 0 1rem 1rem; }

.fav-divider {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 0.5rem 0;
  margin-top: 0.5rem;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

/* Grocery */
.grocery-section {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 1rem 1.1rem;
  margin-bottom: 0.75rem;
  box-shadow: var(--shadow);
}
.grocery-section h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.5rem; }

.grocery-item {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.5rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.88rem;
}
.grocery-item:last-child { border-bottom: none; }
.grocery-item input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--orange); cursor: pointer; flex-shrink: 0; }
.grocery-item.checked label { text-decoration: line-through; color: var(--text-light); }
.grocery-item label { cursor: pointer; flex: 1; }

.grocery-progress {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 1rem 1.1rem;
  margin-bottom: 1rem;
  box-shadow: var(--shadow);
  text-align: center;
}
.progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin-top: 0.5rem; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--orange), var(--orange-light)); border-radius: 4px; transition: width 0.3s; width: 0%; }
.progress-text { font-size: 0.85rem; color: var(--text-light); font-weight: 600; }

.clear-btn {
  margin-top: 0.7rem;
  padding: 0.4rem 1rem;
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  color: var(--text-light);
  font-size: 0.78rem;
  cursor: pointer;
  font-weight: 600;
}
.clear-btn:hover { border-color: var(--orange); color: var(--orange); }

/* Quick Ref */
.ref-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 1rem;
  margin-bottom: 0.75rem;
  box-shadow: var(--shadow);
  overflow-x: auto;
}
.ref-card h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
.ref-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
.ref-table th { background: var(--warm-white); padding: 0.6rem 0.5rem; text-align: left; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-light); border-bottom: 2px solid var(--border); }
.ref-table td { padding: 0.6rem 0.5rem; border-bottom: 1px solid var(--border); }
.ref-table tr:last-child td { border-bottom: none; }

.tips-card {
  background: var(--tip-bg);
  border-radius: var(--radius);
  padding: 1rem 1.1rem;
  margin-bottom: 0.75rem;
  border: 1.5px solid var(--tip-border);
}
.tips-card h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.5rem; }
.tip { font-size: 0.85rem; color: var(--text); padding: 0.3rem 0; line-height: 1.6; }

/* Cook Mode Overlay */
.cook-overlay {
  position: fixed;
  inset: 0;
  background: var(--overlay-bg);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
}
.cook-overlay.active { display: flex; }

.cook-modal {
  background: var(--cook-bg);
  width: 100%;
  height: 100%;
  max-width: 600px;
  max-height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.cook-header {
  background: var(--header-bg);
  color: white;
  padding: 1rem 1.2rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-shrink: 0;
}
.cook-close {
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  font-size: 1.3rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.cook-close:hover { background: rgba(255,255,255,0.35); }
.cook-title { font-size: 1.15rem; font-weight: 700; flex: 1; }

.cook-ingredients {
  padding: 1rem 1.5rem;
  background: var(--warm-white);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.cook-ingredients h3 { font-size: 0.85rem; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
.cook-ing-item { padding: 0.2rem 0; font-size: 0.95rem; }
.cook-ing-amount { font-weight: 700; color: var(--orange); }

.cook-step-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
  min-height: 200px;
}
.cook-step-progress { font-size: 0.8rem; color: var(--text-light); font-weight: 600; margin-bottom: 0.75rem; }
.cook-step-text { font-size: 1.25rem; line-height: 1.7; text-align: center; max-width: 450px; font-weight: 500; }

.cook-nav {
  display: flex;
  gap: 0.75rem;
  padding: 1rem 1.5rem;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--card-bg);
}
.cook-nav button {
  flex: 1;
  padding: 0.85rem;
  border-radius: 10px;
  border: none;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.cook-prev { background: var(--warm-white); color: var(--text); border: 1.5px solid var(--border) !important; }
.cook-prev:hover { border-color: var(--orange) !important; color: var(--orange); }
.cook-prev:disabled { opacity: 0.4; cursor: default; }
.cook-next { background: var(--orange); color: white; }
.cook-next:hover { background: var(--orange-light); }

/* Timer */
.cook-timer {
  padding: 0.75rem 1.5rem;
  background: var(--card-bg);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  flex-shrink: 0;
}
.timer-display {
  font-size: 1.8rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--text);
  min-width: 100px;
  text-align: center;
}
.timer-display.running { color: var(--orange); }
.timer-display.done { color: var(--green); }
.timer-label { font-size: 0.78rem; color: var(--text-light); font-weight: 600; }
.timer-btn {
  padding: 0.5rem 1.2rem;
  border-radius: 8px;
  border: none;
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  background: var(--orange);
  color: white;
}
.timer-btn:hover { background: var(--orange-light); }
.timer-btn.stop { background: var(--red); }
.timer-btn.stop:hover { background: #d06060; }
.timer-reset {
  padding: 0.5rem 0.8rem;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: none;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  color: var(--text-light);
}

/* Footer */
.footer { text-align: center; padding: 2rem 1rem; font-size: 0.78rem; color: var(--text-light); }

/* ===== Edit Mode ===== */
.day-header-actions {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.edit-btn {
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  width: 32px;
  height: 32px;
  font-size: 0.95rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-light);
  transition: all 0.15s;
}
.edit-btn:hover { border-color: var(--orange); color: var(--orange); }
.edit-btn.active { background: var(--orange); color: white; border-color: var(--orange); }

.meal-edit-slot {
  margin-bottom: 0.75rem;
  padding: 0.85rem;
  background: var(--warm-white);
  border-radius: 8px;
  border-left: 4px solid var(--blue);
}
.meal-edit-slot:last-of-type { margin-bottom: 0.75rem; }

.meal-edit-row {
  display: flex;
  gap: 0.5rem;
  align-items: center;
  flex-wrap: wrap;
}

.meal-edit-row select {
  padding: 0.4rem 0.5rem;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  background: var(--card-bg);
  color: var(--text);
  font-size: 0.82rem;
  font-family: inherit;
  cursor: pointer;
  flex: 1;
  min-width: 0;
}
.meal-edit-row select:focus { outline: none; border-color: var(--orange); }

.meal-type-select { flex: 0 0 auto !important; width: 105px; }

.remove-meal-btn {
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 50%;
  width: 28px;
  height: 28px;
  font-size: 1.1rem;
  cursor: pointer;
  color: var(--text-light);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
  line-height: 1;
}
.remove-meal-btn:hover { border-color: var(--red); color: var(--red); }

.add-meal-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.3rem;
  width: 100%;
  padding: 0.5rem;
  border: 2px dashed var(--border);
  border-radius: 8px;
  background: none;
  color: var(--text-light);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  margin-top: 0.25rem;
}
.add-meal-btn:hover { border-color: var(--orange); color: var(--orange); }

.skip-label {
  color: var(--text-light);
  font-style: italic;
  font-size: 0.85rem;
  padding: 0.3rem 0;
}

.meal.skipped { border-left-color: var(--text-light); opacity: 0.7; }

.reset-plan-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  margin-bottom: 1rem;
  padding: 0.45rem 0.9rem;
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text-light);
  font-size: 0.78rem;

function t(key) { return i18n[lang].ui[key] || i18n.en.ui[key] || key; }
function tf(key, ...args) { let s = t(key); args.forEach((a, i) => { s = s.replace('{' + i + '}', a); }); return s; }
function td(key) { return i18n[lang].data[key] || i18n.en.data[key]; }

function tr(id) {
  if (lang !== 'en' && i18n[lang].recipes && i18n[lang].recipes[id]) {
    return i18n[lang].recipes[id];
  }
  const r = recipes.find(x => x.id === id);
  if (!r) return null;
  return {
    name: r.name,
    items: r.ingredients.map(i => i.item),
    units: r.ingredients.map(i => i.unit),
    steps: r.steps,
    timerLabel: r.timer.label
  };
}

function loadPlan() {
  try {
    const saved = localStorage.getItem('customPlan');
    if (saved) {
      const plan = JSON.parse(saved);
      return plan.map(d => ({
        meals: (d.meals || []).map(m => ({
          ...m,
          type: m.type ? m.type.toLowerCase() : 'dinner'
        }))
      }));
    }
  } catch(e) {}
  return JSON.parse(JSON.stringify(defaultWeekPlan));
}

let customPlan = loadPlan();

function savePlan() {
  localStorage.setItem('customPlan', JSON.stringify(customPlan));
  localStorage.removeItem('groceryChecks');
}

function resetPlan() {
  if (!confirm(t('resetConfirm'))) return;
  customPlan = JSON.parse(JSON.stringify(defaultWeekPlan));
  localStorage.removeItem('customPlan');
  localStorage.removeItem('groceryChecks');
  editingDays.clear();
  renderWeekPlan();
  renderGrocery();
}

// ============ HELPERS ============
function getRecipe(id) { return recipes.find(r => r.id === id); }
function isFav(id) { return favorites.includes(id); }
function getServings(id) { const r = getRecipe(id); return servingsState[id] || r.servings; }
function getScale(id) { const r = getRecipe(id); return getServings(id) / r.servings; }

function toggleFavorite(id) {
  if (isFav(id)) { favorites = favorites.filter(f => f !== id); }
  else { favorites.push(id); }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  renderAll();
}

function setServings(id, val) {
  val = Math.max(1, Math.min(20, val));
  servingsState[id] = val;
  localStorage.setItem('servingsState', JSON.stringify(servingsState));
  renderRecipes();
}

function methodBadge(m) {
  const methods = td('methods');
  const clsMap = { pressure: 'badge-pressure', air: 'badge-air', combo: 'badge-combo', saute: 'badge-saute' };
  const label = methods[m] || '';
  const cls = clsMap[m] || '';
  return `<span class="badge ${cls}">${label}</span>`;
}

function formatAmount(amount, scale) {
  if (amount === 0) return '';
  const v = amount * scale;
  if (v === Math.floor(v)) return String(v);
  const fracs = [[0.25,'\u00bc'],[0.333,'\u2153'],[0.5,'\u00bd'],[0.666,'\u2154'],[0.75,'\u00be']];
  const whole = Math.floor(v);
  const frac = v - whole;
  for (const [val, sym] of fracs) {
    if (Math.abs(frac - val) < 0.05) return whole ? `${whole}${sym}` : sym;
  }
  return v.toFixed(1).replace(/\.0$/, '');
}

function renderIngredients(recipe, scale, recipeText) {
  return recipe.ingredients.map((ing, idx) => {
    const amt = formatAmount(ing.amount, scale);
    const itemText = recipeText ? recipeText.items[idx] : ing.item;
    const unitText = recipeText ? recipeText.units[idx] : ing.unit;
    return `<div class="ing-item"><span class="ing-amount">${amt}${amt && unitText ? ' ' + unitText : ''}</span> ${itemText}</div>`;
  }).join('');
}

function getDaysForRecipe(id) {
  const days = td('days');
  return customPlan.map((d, i) => ({ d, i })).filter(({ d }) => d.meals.some(m => m.recipeId === id)).map(({ i }) => days[i].slice(0,3));
}

// ============ SLOT MANAGEMENT ============
function setSlotServings(di, mi, val) {
  val = Math.max(1, Math.min(20, val));
  customPlan[di].meals[mi].servings = val;
  savePlan();
  renderWeekPlan();
  renderGrocery();
}

function setSlotRecipe(di, mi, recipeId) {
  customPlan[di].meals[mi].recipeId = recipeId || null;
  if (recipeId) {
    const r = getRecipe(recipeId);
    if (r) customPlan[di].meals[mi].servings = r.servings;
  }
  savePlan();
  renderWeekPlan();
  renderGrocery();
}

function setSlotType(di, mi, type) {
  customPlan[di].meals[mi].type = type;
  savePlan();
  renderWeekPlan();
}

function addSlot(di) {
  if (customPlan[di].meals.length >= 4) return;
  customPlan[di].meals.push({ recipeId: null, type: "dinner", servings: 2 });
  savePlan();
  renderWeekPlan();
}

function removeSlot(di, mi) {
  customPlan[di].meals.splice(mi, 1);
  savePlan();
  renderWeekPlan();
  renderGrocery();
}

function toggleEditDay(di) {
  if (editingDays.has(di)) {
    editingDays.delete(di);
  } else {
    editingDays.add(di);
    expandedDays.add(di);
  }
  renderWeekPlan();
}

function toggleDay(di) {
  if (expandedDays.has(di)) expandedDays.delete(di);
  else expandedDays.add(di);
  renderWeekPlan();
}

  };
  return Object.entries(groups).map(([type, recs]) => {
    if (!recs.length) return '';
    const label = typeMap[type] || type;
    return `<optgroup label="${label}">${recs.map(r => {
      const rt = tr(r.id);
      return `<option value="${r.id}" ${r.id===selectedId?'selected':''}>${rt ? rt.name : r.name}</option>`;
    }).join('')}</optgroup>`;
  }).join('');
}

// ============ RENDER WEEK PLAN ============
function renderDayViewMode(day, di) {
  if (!day.meals.length) {
    return `<div class="skip-label" style="text-align:center;padding:0.5rem;">${t('noMeals')}</div>`;
  }
  const typeMap = td('mealTypeMap');
  return day.meals.map((m, mi) => {
    const typeLabel = typeMap[m.type] || m.type;
    if (!m.recipeId) {
      return `
        <div class="meal skipped">
          <div class="meal-header">
            <span class="meal-type">${typeLabel}</span>
          </div>
          <div class="skip-label">${t('eatingOut')}</div>
        </div>`;
    }
    const r = getRecipe(m.recipeId);
    if (!r) return '';
    const rt = tr(r.id);
    const scale = m.servings / r.servings;
    return `
      <div class="meal">
        <div class="meal-header">
          <span class="meal-type">${typeLabel}</span>
          ${r.methods.map(methodBadge).join('')}
        </div>
        <div class="meal-name">${rt.name}</div>
        <div class="servings-ctrl">
          <button onclick="event.stopPropagation();setSlotServings(${di},${mi},${m.servings-1})">-</button>
          <span class="servings-val">${m.servings}</span>
          <button onclick="event.stopPropagation();setSlotServings(${di},${mi},${m.servings+1})">+</button>
          <span>${t('servings')}</span>
        </div>
        <div class="ingredients-list">${renderIngredients(r, scale, rt)}</div>
        <div class="meal-steps">${rt.steps.map((st,i) => `<div class="step">${i+1}. ${st}</div>`).join('')}</div>
        <div class="meal-actions">
          <button class="btn-heart ${isFav(r.id)?'active':''}" onclick="event.stopPropagation();toggleFavorite('${r.id}')">${isFav(r.id)?'\u2764\ufe0f':'\ud83e\ude76'} ${t('fave')}</button>
          <button class="btn-cook" onclick="event.stopPropagation();openCookMode('${r.id}',${m.servings})">&#x1F373; ${t('cook')}</button>
        </div>
      </div>`;
  }).join('');
}

function renderDayEditMode(day, di) {
  const mealTypes = td('mealTypes');
  const mealTypeKeys = td('mealTypeKeys');
  let html = day.meals.map((m, mi) => {
    return `
      <div class="meal-edit-slot">
        <div class="meal-edit-row">
          <select class="meal-type-select" onchange="setSlotType(${di},${mi},this.value)">
            ${mealTypeKeys.map((k, i) =>
              `<option value="${k}" ${m.type===k?'selected':''}>${mealTypes[i]}</option>`
            ).join('')}
          </select>
          <select onchange="setSlotRecipe(${di},${mi},this.value)">
            <option value="" ${!m.recipeId?'selected':''}>${t('skip')}</option>
            ${renderRecipeOptions(m.recipeId)}
          </select>
          <button class="remove-meal-btn" onclick="removeSlot(${di},${mi})" title="${t('remove')}">&times;</button>
        </div>
        ${m.recipeId ? `
          <div class="servings-ctrl">
            <button onclick="setSlotServings(${di},${mi},${m.servings-1})">-</button>

function renderWeekPlan() {
  const el = document.getElementById('plan');
  const days = td('days');
  let html = `<button class="reset-plan-btn" onclick="resetPlan()">${t('resetDefault')}</button>`;

  html += customPlan.map((day, di) => {
    const isEditing = editingDays.has(di);

    return `

          </div>
          <div class="day-header-actions">
            <button class="edit-btn ${isEditing?'active':''}" onclick="event.stopPropagation();toggleEditDay(${di})" title="${isEditing?t('doneEditing'):t('editDay')}">
              ${isEditing ? '\u2713' : '\u270e'}

            <div class="day-chevron">\u25bc</div>

// ============ RENDER RECIPES ============
function renderRecipes() {
  const el = document.getElementById('recipes');
  let filtered = recipes.filter(r => {
    if (activeMethodFilter !== 'all' && !r.methods.includes(activeMethodFilter)) return false;
    if (activeMealFilter !== 'all' && r.mealType !== activeMealFilter) return false;
    return true;
  });

  const favRecipes = filtered.filter(r => isFav(r.id));
  const otherRecipes = filtered.filter(r => !isFav(r.id));

  const methods = td('methods');
  const mealTypeMap = td('mealTypeMap');
  const methodFilters = [['all','All'], ...Object.entries(methods)];
  const mealFilters = [['all','All'], ...Object.entries(mealTypeMap)];

  let html = `
    <div class="filter-bar">
      <div class="filter-label">${t('method')}</div>
      ${methodFilters.map(([v,l]) => `<button class="filter-pill ${activeMethodFilter===v?'active':''}" onclick="activeMethodFilter='${v}';renderRecipes()">${l}</button>`).join('')}
    </div>
    <div class="filter-bar">
      <div class="filter-label">${t('mealFilter')}</div>
      ${mealFilters.map(([v,l]) => `<button class="filter-pill ${activeMealFilter===v?'active':''}" onclick="activeMealFilter='${v}';renderRecipes()">${l}</button>`).join('')}
    </div>`;

  if (favRecipes.length) {
    html += `<div class="fav-divider">\u2764\ufe0f ${t('favLabel')} (${favRecipes.length})</div>`;
    html += favRecipes.map(r => renderRecipeCard(r)).join('');
    if (otherRecipes.length) {
      html += `<div class="fav-divider">${t('allRecipes')}</div>`;
    }
  }
  html += otherRecipes.map(r => renderRecipeCard(r)).join('');

  if (!filtered.length) {
    html += `<div style="text-align:center;padding:2rem;color:var(--text-light);">${t('noMatch')}</div>`;
  }

  el.innerHTML = html;
}

    <div class="recipe-card" id="rc-${r.id}">

function toggleRecipeCard(id) {
  document.getElementById('rc-' + id).classList.toggle('expanded');
}

// ============ GROCERY LIST COMPUTATION ============
function normalizeItem(item) {
  return item.toLowerCase()
    .replace(/,\s*(diced|sliced|cored|seasoned|drained|chopped|minced)\b/gi, '')
    .trim();
}

function computeGroceryList() {
  const mergeMap = {};
  let mealCount = 0;
  let totalServings = 0;

  for (const day of customPlan) {
    for (const slot of day.meals) {
      if (!slot.recipeId) continue;
      const r = getRecipe(slot.recipeId);
      if (!r) continue;
      mealCount++;
      totalServings += slot.servings;
      const scale = slot.servings / r.servings;
      const rt = tr(r.id);

      r.ingredients.forEach((ing, idx) => {
        if (!ing.cat) return;

        const normName = normalizeItem(ing.item);
        const key = normName + '||' + (ing.amount === 0 ? '_zero_' : ing.unit);

        if (!mergeMap[key]) {
          const displayName = rt ? rt.items[idx] : ing.item;
          const displayUnit = rt ? rt.units[idx] : ing.unit;
          mergeMap[key] = {
            item: normName,
            displayItem: normalizeItem(displayName),
            displayUnit: displayUnit,
            amount: 0,
            unit: ing.unit,
            cat: ing.cat,
            isZero: ing.amount === 0
          };
        }

        if (ing.amount > 0) {
          mergeMap[key].amount += ing.amount * scale;
          mergeMap[key].isZero = false;
        }
      });
    }
  }

  const catOrder = ["Proteins", "Grains & Pasta", "Produce", "Canned / Jarred", "Pantry", "Frozen"];
  const categories = {};
  for (const entry of Object.values(mergeMap)) {
    if (!categories[entry.cat]) categories[entry.cat] = [];
    categories[entry.cat].push(entry);
  }

  return { categories, catOrder, mealCount, totalServings };
}

// ============ RENDER GROCERY ============
function renderGrocery() {
  const el = document.getElementById('grocery');
  const { categories, catOrder, mealCount, totalServings } = computeGroceryList();
  const catLabels = td('categories');

  if (mealCount === 0) {
    el.innerHTML = `
      <div class="grocery-summary">${t('noMealsPlanned')}</div>
      <div class="grocery-empty">${t('addMealsPrompt')}</div>`;
    return;
  }

  let gIdx = 0;
  const sections = catOrder.filter(cat => categories[cat] && categories[cat].length).map(cat => {
    const items = categories[cat].map(entry => {
      gIdx++;
      let label;
      if (entry.isZero || entry.amount === 0) {
        label = entry.displayItem;
      } else {
        const amt = formatAmount(entry.amount, 1);
        label = `${amt}${entry.displayUnit ? ' ' + entry.displayUnit : ''} ${entry.displayItem}`;
      }
      return `<div class="grocery-item"><input type="checkbox" id="g${gIdx}" onchange="updateProgress()"><label for="g${gIdx}">${label}</label></div>`;
    }).join('');
    return `<div class="grocery-section"><h3>${catLabels[cat] || cat}</h3>${items}</div>`;
  }).join('');

  el.innerHTML = `
    <div class="grocery-summary">${tf('grocerySummary', mealCount, totalServings)}</div>
    <div class="grocery-progress">
      <div class="progress-text"><span id="checkedCount">0</span> / <span id="totalCount">0</span> ${t('items')}</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <button class="clear-btn" onclick="clearChecks()">${t('clearAll')}</button>
    </div>
    ${sections}`;
  restoreGrocery();
}

// ============ COOK MODE ============
function openCookMode(id, slotServings) {
  cookState.recipeId = id;
  cookState.step = 0;
  cookState.slotServings = slotServings || null;
  cookState.timerSeconds = getRecipe(id).timer.minutes * 60;
  cookState.timerRunning = false;
  if (cookState.timerInterval) clearInterval(cookState.timerInterval);
  cookState.timerInterval = null;
  renderCookMode();
  document.getElementById('cookOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
  requestWakeLock();
}

function closeCookMode() {
  document.getElementById('cookOverlay').classList.remove('active');
  document.body.style.overflow = '';
  if (cookState.timerInterval) clearInterval(cookState.timerInterval);
  cookState.timerRunning = false;
  releaseWakeLock();
}

function renderCookMode() {
  const r = getRecipe(cookState.recipeId);
  const rt = tr(r.id);
  const cookServings = cookState.slotServings || getServings(r.id);
  const cookScale = cookServings / r.servings;
  const s = cookState.step;
  const total = rt.steps.length;
  const mm = String(Math.floor(cookState.timerSeconds / 60)).padStart(2, '0');
  const ss = String(cookState.timerSeconds % 60).padStart(2, '0');
  const timerClass = cookState.timerRunning ? 'running' : (cookState.timerSeconds === 0 ? 'done' : '');

  document.getElementById('cookModal').innerHTML = `
    <div class="cook-header">
      <button class="cook-close" onclick="closeCookMode()">&times;</button>
      <div class="cook-title">${rt.name}</div>
    </div>
    <div class="cook-ingredients">
      <h3>${t('ingredients')} (${cookServings} ${t('servings')})</h3>
      ${r.ingredients.map((ing, idx) => {
        const amt = formatAmount(ing.amount, cookScale);
        const itemText = rt.items[idx];
        const unitText = rt.units[idx];
        return `<div class="cook-ing-item"><span class="cook-ing-amount">${amt}${amt && unitText ? ' ' + unitText : ''}</span> ${itemText}</div>`;
      }).join('')}
    </div>
    <div class="cook-step-area">
      <div class="cook-step-progress">${tf('stepOf', s+1, total)}</div>
      <div class="cook-step-text">${rt.steps[s]}</div>
    </div>
    <div class="cook-timer">
      <div>
        <div class="timer-label">${rt.timerLabel}</div>
        <div class="timer-display ${timerClass}">${mm}:${ss}</div>
      </div>
      ${cookState.timerRunning
        ? `<button class="timer-btn stop" onclick="pauseTimer()">${t('pause')}</button>`
        : `<button class="timer-btn" onclick="startTimer()">${t('start')}</button>`
      }
      <button class="timer-reset" onclick="resetTimer()">${t('resetTimer')}</button>
    </div>
    <div class="cook-nav">
      <button class="cook-prev" onclick="cookStep(-1)" ${s===0?'disabled':''}>${t('prev')}</button>
      <button class="cook-next" onclick="cookStep(1)">${s===total-1?t('done'):t('next')}</button>
    </div>`;
}

function cookStep(dir) {
  const r = getRecipe(cookState.recipeId);
  if (dir === 1 && cookState.step === r.steps.length - 1) { closeCookMode(); return; }
  cookState.step = Math.max(0, Math.min(r.steps.length - 1, cookState.step + dir));
  renderCookMode();
}

function startTimer() {
  if (cookState.timerSeconds <= 0) return;
  cookState.timerRunning = true;
  cookState.timerInterval = setInterval(() => {
    cookState.timerSeconds--;
    if (cookState.timerSeconds <= 0) {
      cookState.timerSeconds = 0;
      clearInterval(cookState.timerInterval);
      cookState.timerRunning = false;
      playBeep();
    }
    renderCookMode();
  }, 1000);
  renderCookMode();
}

function pauseTimer() {
  clearInterval(cookState.timerInterval);
  cookState.timerRunning = false;
  renderCookMode();
}

function resetTimer() {
  clearInterval(cookState.timerInterval);
  cookState.timerRunning = false;
  const r = getRecipe(cookState.recipeId);
  cookState.timerSeconds = r.timer.minutes * 60;
  renderCookMode();
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.3, 0.6].forEach(delay => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 880;
      osc.type = 'sine';
      gain.gain.value = 0.3;
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.15);
    });
  } catch(e) {}
}

async function requestWakeLock() {
  try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

// ============ TABS ============
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.tab).classList.add('active');
  });
});

// ============ GROCERY ============
function updateProgress() {
  const cbs = document.querySelectorAll('#grocery input[type="checkbox"]');
  const checked = document.querySelectorAll('#grocery input[type="checkbox"]:checked');
  const cnt = document.getElementById('checkedCount');
  const tot = document.getElementById('totalCount');
  const fill = document.getElementById('progressFill');
  if (cnt) cnt.textContent = checked.length;
  if (tot) tot.textContent = cbs.length;
  if (fill) fill.style.width = (cbs.length ? checked.length / cbs.length * 100 : 0) + '%';
  cbs.forEach(cb => cb.closest('.grocery-item').classList.toggle('checked', cb.checked));
  const state = {};
  cbs.forEach(cb => { state[cb.id] = cb.checked; });
  localStorage.setItem('groceryChecks', JSON.stringify(state));
}

function clearChecks() {
  document.querySelectorAll('#grocery input[type="checkbox"]').forEach(cb => { cb.checked = false; });
  localStorage.removeItem('groceryChecks');
  updateProgress();
}

function restoreGrocery() {
  try {
    const state = JSON.parse(localStorage.getItem('groceryChecks'));
    if (state) Object.keys(state).forEach(id => { const cb = document.getElementById(id); if (cb) cb.checked = state[id]; });
  } catch(e) {}
  updateProgress();
}

// ============ DARK MODE ============
function toggleDarkMode() {
  document.body.classList.toggle('dark');
  const isDark = document.body.classList.contains('dark');
  localStorage.setItem('darkMode', isDark ? '1' : '0');
  document.querySelector('.dark-toggle').textContent = isDark ? '\ud83c\udf19' : '\u2600\ufe0f';
}

function initDarkMode() {
  const stored = localStorage.getItem('darkMode');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (stored === '1' || (stored === null && prefersDark)) {
    document.body.classList.add('dark');
    document.querySelector('.dark-toggle').textContent = '\ud83c\udf19';
  }
}

// ============ RENDER ALL ============
function renderAll() {
  renderWeekPlan();
  renderRecipes();
  renderGrocery();
  renderQuickRef();
}

// ============ INIT ============
initDarkMode();
document.documentElement.lang = lang;
document.querySelector('.lang-toggle').textContent = lang === 'en' ? 'HU' : 'EN';
if (lang !== 'en') {
  setLang(lang);
} else {
  renderAll();
}
