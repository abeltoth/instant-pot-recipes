<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instant Pot Pro Crisp — Week 1 Meal Plan</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <h1 id="headerTitle">Instant Pot Pro Crisp</h1>
  <div class="header-sub" id="headerSub">Week 1 Meal Plan</div>
  <div class="dairy-free-badge" id="headerBadge">&#x1F373; Beginner Friendly</div>
  <button class="dark-toggle" onclick="toggleDarkMode()" title="Toggle dark mode">&#x2600;&#xFE0F;</button>
  <button class="lang-toggle" onclick="toggleLang()">HU</button>
</div>

<div class="tabs">
  <button class="tab active" data-tab="plan" id="tabPlan">Week Plan</button>
  <button class="tab" data-tab="recipes" id="tabRecipes">Recipes</button>
  <button class="tab" data-tab="grocery" id="tabGrocery">Grocery List</button>
  <button class="tab" data-tab="ref" id="tabRef">Quick Ref</button>
</div>

<div class="content">
  <div id="plan" class="view active"></div>
  <div id="recipes" class="view"></div>
  <div id="grocery" class="view"></div>
  <div id="ref" class="view"></div>
</div>

<div class="footer" id="footerText">
  Instant Pot Pro Crisp &mdash; Week 1 Meal Plan<br>
  Beginner Friendly
</div>

<!-- Cook Mode Overlay -->
<div class="cook-overlay" id="cookOverlay">
  <div class="cook-modal" id="cookModal"></div>
</div>

<script src="js/i18n.js"></script>
<script src="js/recipes.js"></script>
<script src="js/app.js"></script>
</body>
</html>
